name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: tool-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: tool-site

      - name: Build static export
        run: npm run build
        working-directory: tool-site

      - name: Verify build output
        run: |
          echo "=== 检查 GA4 脚本 ==="
          grep -l "googletagmanager" tool-site/out/index.html && echo "✅ GA4 存在" || echo "❌ GA4 缺失"
          echo "=== 检查 AdSense 脚本 ==="
          grep -l "adsbygoogle" tool-site/out/index.html && echo "✅ AdSense 存在" || echo "❌ AdSense 缺失"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: devtoolbox
          directory: tool-site/out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
